<!DOCTYPE html>
<html>
<head>
    <style>
        body { margin: 0; padding: 20px; background: #ccc; }
        .icon {
            width: 512px;
            height: 512px;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border: 1px solid #000;
        }
        .banner {
            width: 1024px;
            height: 500px;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border: 1px solid #000;
            margin-top: 20px;
        }
        img {
            max-width: 100%;
            max-height: 100%;
        }
        .icon-logo {
            width: 384px; /* Safe zone */
            height: 384px;
        }
        .banner-logo {
            width: 400px;
            height: 400px;
        }
    </style>
</head>
<body>
    <div id="icon" class="icon">
        <img src="logo.png" class="icon-logo">
    </div>
    <div id="banner" class="banner">
        <img src="logo.png" class="banner-logo">
        <h1 style="font-family: sans-serif; margin-left: 20px; font-size: 80px;">BJJFLOW</h1>
    </div>
</body>
</html>
